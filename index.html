<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Menú Interactivo</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #000; }
        
        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #000 0%, #1a1a2e 50%, #16213e 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 3000; transition: opacity 1.2s ease-out;
        }
        .logo-gusto { width: 220px; height: auto; margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(37, 211, 102, 0.5)); }
        
        .pantalla {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.5s ease;
        }
        .pantalla.activa { opacity: 1; visibility: visible; }

        .btn-categoria {
            width: 280px; padding: 20px; margin: 10px; background: linear-gradient(45deg, #25D366, #128C7E);
            color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        .lista-platos { width: 85%; max-height: 60vh; overflow-y: auto; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; }
        
        /* ITEM DE PLATO CON BOTÓN DE AUDIO */
        .plato-item {
            padding: 15px; margin: 10px 0; background: rgba(37, 211, 102, 0.15);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white;
            display: flex; flex-direction: column; gap: 10px; font-family: sans-serif;
        }
        .btn-ver-ar {
            background: #25D366; color: black; border: none; padding: 10px; 
            border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center;
        }

        #plato-info { position: fixed; top: 50px; width: 100%; text-align: center; color: white; font-family: sans-serif; font-size: 22px; font-weight: bold; z-index: 1001; display: none; }
        #ui-ar { position: fixed; bottom: 40px; width: 100%; display: none; justify-content: center; gap: 15px; z-index: 1001; }
        .btn-ar { padding: 15px 25px; background: linear-gradient(45deg, #25D366, #128C7E); color: white; border: 2px solid white; border-radius: 50px; font-weight: bold; }
        
        #btn-volver { position: fixed; top: 20px; left: 20px; width: 50px; height: 50px; border-radius: 50%; background: #25D366; color: white; border: 2px solid white; z-index: 2500; display: none; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="mensaje-carga">GUSTÓ 3D</div>
        <div style="width: 200px; height: 4px; background: rgba(255,255,255,0.2); margin-top: 20px;">
            <div id="fill" style="height: 100%; background: #25D366; width: 0%;"></div>
        </div>
    </div>

    <div id="pantalla-categorias" class="pantalla activa">
        <h1 style="color: #25D366; font-family: sans-serif;">SELECCIONA CATEGORÍA</h1>
        <button class="btn-categoria" data-cat="0">🥗 ENTRADAS</button>
        <button class="btn-categoria" data-cat="1">🍖 PLATO FUERTE</button>
        <button class="btn-categoria" data-cat="2">🍰 POSTRES</button>
        <button class="btn-categoria" data-cat="3">🥤 BEBIDAS</button>
    </div>

    <div id="pantalla-platos" class="pantalla">
        <h2 id="titulo-categoria" style="color: #25D366; font-family: sans-serif;"></h2>
        <div class="lista-platos" id="lista-platos"></div>
    </div>

    <button id="btn-volver">←</button>

    <div id="plato-info"></div>
    <div id="ui-ar">
        <button class="btn-ar" id="ar-back-list">VOLVER</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" id="ar-scene">
        
        <a-assets>
            <audio id="sonido-plato-tag" crossorigin="anonymous"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="contenedor-estabilizador">
                <a-gltf-model id="visor" rotation="90 0 0"></a-gltf-model>
                <a-entity id="entidad-sonido" sound="src: #sonido-plato-tag; autoplay: false"></a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        let catalogo = [];
        let catActual = -1;
        const mapeoPlatos = { 0: [0, 1], 1: [2, 3], 2: [4], 3: [5] };
        const nombresCategorias = ["Entradas", "Plato Fuerte", "Postres", "Bebidas"];

        const arScene = document.getElementById('ar-scene');
        const visor = document.getElementById('visor');
        const audioTag = document.getElementById('sonido-plato-tag');
        const soundEntity = document.getElementById('entidad-sonido');

        // ✅ FUNCIÓN CLAVE: SE ACTIVA POR CLIC DEL USUARIO
        async function mostrarPlatoAR(idx) {
            const plato = catalogo[idx];
            
            // 1. Limpiar interfaces
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById('btn-volver').style.display = 'none';

            // 2. Configurar Audio (El clic del botón permite esto)
            if (plato.audio) {
                audioTag.src = plato.audio;
                audioTag.load();
                audioTag.oncanplaythrough = () => {
                    soundEntity.components.sound.stopSound();
                    soundEntity.components.sound.playSound();
                };
            }

            // 3. Configurar Modelo 3D
            visor.setAttribute('gltf-model', plato.archivo);
            visor.setAttribute('scale', plato.escala || "1 1 1");
            
            // 4. Iniciar Cámara
            const mindarSystem = arScene.systems['mindar-image-system'];
            await mindarSystem.start();

            document.getElementById('plato-info').textContent = plato.nombre;
            document.getElementById('plato-info').style.display = 'block';
            document.getElementById('ui-ar').style.display = 'flex';
        }

        function abrirCategoria(id) {
            catActual = id;
            const lista = document.getElementById('lista-platos');
            document.getElementById('titulo-categoria').textContent = nombresCategorias[id];
            lista.innerHTML = '';

            mapeoPlatos[id].forEach(idx => {
                const p = catalogo[idx];
                const div = document.createElement('div');
                div.className = 'plato-item';
                div.innerHTML = `
                    <div style="display:flex; justify-content: space-between;">
                        <strong>${p.nombre}</strong>
                        <span>${p.audio ? '🔊' : ''}</span>
                    </div>
                    <button class="btn-ver-ar" onclick="mostrarPlatoAR(${idx})">VER EN REALIDAD AUMENTADA</button>
                `;
                lista.appendChild(div);
            });

            document.getElementById('pantalla-platos').classList.add('activa');
            document.getElementById('btn-volver').style.display = 'block';
        }

        // Inicialización
        async function init() {
            try {
                const res = await fetch('./menu.json');
                const data = await res.json();
                catalogo = data.platos;

                document.querySelectorAll('.btn-categoria').forEach(btn => {
                    btn.onclick = () => abrirCategoria(parseInt(btn.dataset.cat));
                });

                document.getElementById('btn-volver').onclick = () => {
                    document.getElementById('pantalla-platos').classList.remove('activa');
                    document.getElementById('pantalla-categorias').classList.add('activa');
                    document.getElementById('btn-volver').style.display = 'none';
                };

                document.getElementById('ar-back-list').onclick = () => {
                    location.reload(); // Forma más limpia de resetear cámara y audio
                };

                // Simular carga
                let p = 0;
                const interval = setInterval(() => {
                    p += 10;
                    document.getElementById('fill').style.width = p + '%';
                    if(p >= 100) {
                        clearInterval(interval);
                        document.getElementById('loading-screen').style.opacity = '0';
                        setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1000);
                    }
                }, 100);

            } catch (e) { console.error(e); }
        }

        window.onload = init;
    </script>
</body>
</html>
