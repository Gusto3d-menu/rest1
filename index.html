<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gustó3D - Pro Fijo</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #000; }
        
        /* 🎨 PANTALLA DE CARGA MEJORADA */
        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #000 0%, #1a1a2e 50%, #16213e 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 3000; transition: opacity 1.2s ease-out;
        }
        .logo-gusto { 
            width: 220px; height: auto; margin-bottom: 30px; 
            filter: drop-shadow(0 0 20px rgba(37, 211, 102, 0.5));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .mensaje-carga { 
            color: #25D366; font-family: sans-serif; letter-spacing: 3px; 
            font-size: 14px; text-transform: uppercase; margin-bottom: 20px;
            animation: pulse-text 1.5s infinite;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .barra-progreso {
            width: 200px; height: 4px; background: rgba(255,255,255,0.2);
            border-radius: 2px; overflow: hidden; margin-top: 20px;
        }
        .progreso-fill {
            height: 100%; background: linear-gradient(90deg, #25D366, #128C7E);
            width: 0%; transition: width 0.3s ease; border-radius: 2px;
            animation: progress-fill 4s ease-out forwards;
        }
        @keyframes progress-fill {
            0% { width: 0%; }
            70% { width: 85%; }
            100% { width: 100%; }
        }
        
        #plato-info { position: fixed; top: 40px; width: 100%; text-align: center; color: white; font-family: sans-serif; font-size: 20px; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.9); z-index: 1000; opacity: 0; transition: 0.5s; }
        #plato-info.show { opacity: 1; }
        #ui-overlay { position: fixed; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 1000; opacity: 0; transition: 0.5s; }
        #ui-overlay.show { opacity: 1; }
        .btn-gusto { padding: 15px 25px; background: linear-gradient(45deg, #25D366, #128C7E); color: white; border: 2px solid #fff; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .en-preparacion { color: #ff6b35 !important; font-size: 18px !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <!-- 🎨 PANTALLA DE CARGA EXTENDIDA -->
    <div id="loading-screen">
        <img src="logo-banco.jpg" class="logo-gusto" alt="Logo">
        <div class="mensaje-carga">CARGANDO MENÚ GASTRONÓMICO</div>
        <div class="barra-progreso">
            <div class="progreso-fill"></div>
        </div>
        <div style="color: #666; font-size: 12px; margin-top: 30px; letter-spacing: 1px;">
            Inicializando Realidad Aumentada...
        </div>
    </div>

    <div id="plato-info"></div>
    <div id="ui-overlay">
        <button class="btn-gusto" id="btn-prev">←</button>
        <button class="btn-gusto" id="btn-next">→</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; filterMinCF: 0.001; filterBeta: 0.01;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-entity id="contenedor-estabilizador" scale="0.01 0.01 0.01">
                <a-gltf-model id="visor"></a-gltf-model>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const visor = document.getElementById("visor");
        const contenedor = document.getElementById("contenedor-estabilizador");
        const info = document.getElementById("plato-info");
        let catalogo = [];
        let platoActual = 0;

        // 🔥 EVENTO MODEL-LOADED (sin cambios)
        visor.addEventListener('model-loaded', function() {
            const p = catalogo[platoActual];
            console.log('✅ Modelo listo - activando animaciones', p.velocidad);
            
            contenedor.removeAttribute("animation__escala");
            visor.removeAttribute("animation__rotar");
            
            contenedor.setAttribute("position", p.pos);
            contenedor.setAttribute("animation__escala", {
                property: "scale",
                to: p.escala,
                dur: p.anim_dur || 1100,
                easing: "easeOutElastic"
            });
            
            visor.setAttribute("animation__rotar", {
                property: "rotation",
                from: p.rot_inicial,
                to: p.rot_final,
                dur: p.velocidad,
                loop: true,
                easing: "linear"
            });

            info.textContent = p.nombre;
            info.classList.remove("en-preparacion");
        });

        async function verificarModelo(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                return response.ok;
            } catch (e) { return false; }
        }

        async function cambiarPlato(dir) {
            if (!catalogo.length) return;
            platoActual = (platoActual + dir + catalogo.length) % catalogo.length;
            const p = catalogo[platoActual];

            contenedor.removeAttribute("animation__escala");
            visor.removeAttribute("animation__rotar");
            contenedor.setAttribute("scale", "0.01 0.01 0.01");
            visor.removeAttribute("gltf-model"); 

            const modeloExiste = await verificarModelo(p.archivo);
            
            if (modeloExiste) {
                visor.setAttribute("gltf-model", p.archivo);
                info.textContent = p.nombre;
                info.classList.remove("en-preparacion");
            } else {
                info.textContent = "En preparación...";
                info.classList.add("en-preparacion");
            }
            
            info.classList.add("show");
        }

        // 🎨 INICIO CON CARGA EXTENDIDA (6 SEGUNDOS TOTAL)
        async function iniciar() {
            // MOSTRAR ANIMACIÓN 3 SEGUNDOS
            setTimeout(async () => {
                try {
                    const res = await fetch('./menu.json');
                    const data = await res.json();
                    catalogo = data.platos;
                    
                    document.getElementById("btn-prev").onclick = () => cambiarPlato(-1);
                    document.getElementById("btn-next").onclick = () => cambiarPlato(1);
                    
                    cambiarPlato(0);
                } catch (e) { 
                    console.error("Error menú");
                    info.textContent = "En preparación...";
                    info.classList.add("show", "en-preparacion");
                }
            }, 3000); // ← 3s de "ambiente"
            
            // OCULTAR LOADING DESPUÉS DE 6s TOTALES
            setTimeout(() => {
                document.getElementById("loading-screen").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("loading-screen").style.display = "none";
                    document.getElementById("ui-overlay").classList.add("show");
                }, 1200);
            }, 6000); // ← 6s totales
        }

        document.addEventListener('DOMContentLoaded', iniciar);
    </script>
</body>
</html>
