<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustó 3D - Experiencia RA</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        /* UI simple para indicarle al usuario qué hacer */
        #ui-overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; font-family: sans-serif; background: rgba(0,0,0,0.7);
            color: white; padding: 10px 20px; border-radius: 20px; pointer-events: none;
            text-align: center; font-size: 14px; border: 1px solid #22c55e;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">Apunta tu cámara hacia el código QR del menú</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-box position="0 0 0" rotation="0 45 0" scale="0.5 0.5 0.5" material="color: #22c55e; opacity: 0.8"></a-box>
        
      </a-entity>
    </a-scene>

</body>
</html>
